name: E2E Tests

on:
  workflow_dispatch:
  workflow_call:

jobs:
  e2e:
    name: E2E — ${{ matrix.browser }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      # Let all browsers run even if one fails so we get a full picture.
      fail-fast: false
      matrix:
        include:
          - browser: chromium
            optional: false
          - browser: firefox
            optional: false
          - browser: webkit
            optional: true

    # Optional browsers are allowed to fail without blocking
    # the overall workflow result.
    continue-on-error: ${{ matrix.optional }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build the project
        run: npm run build

      - name: Cache Playwright browser binaries
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ matrix.browser }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser and system dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Install Playwright system dependencies (cached browser)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps ${{ matrix.browser }}

      - name: Start wp-env test environment
        run: npm run wp-env start
        timeout-minutes: 10

      - name: Run E2E tests
        run: npm run test:e2e -- --project=${{ matrix.browser }}
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 4

      - name: Stop wp-env test environment
        if: always()
        run: npm run wp-env stop
